<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Nuova password | Ricettario Neil</title>
  <link rel="stylesheet" href="admin.css" />
</head>
<body>
  <main style="max-width:480px;margin:60px auto;padding:24px;">
    <h1>Imposta nuova password</h1>
    <p>Inserisci una nuova password per il tuo account admin.</p>

    <div style="display:grid;gap:12px;">
      <input id="password" type="password" placeholder="Nuova password" />
      <input id="confirmPassword" type="password" placeholder="Conferma nuova password" />
      <button id="updatePasswordBtn" type="button">Aggiorna password</button>
      <p id="message" style="margin-top:8px;"></p>
    </div>

    <p style="margin-top:20px;">
      <a href="login.html">Torna al login</a>
    </p>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="supabase.js"></script>
  <script>
    const passwordInput = document.getElementById('password');
    const confirmPasswordInput = document.getElementById('confirmPassword');
    const updatePasswordBtn = document.getElementById('updatePasswordBtn');
    const message = document.getElementById('message');

    async function waitForRecoverySession() {
      return new Promise((resolve) => {
        let resolved = false;

        window.supabaseClient.auth.onAuthStateChange((event, session) => {
          if (event === 'PASSWORD_RECOVERY') {
            resolved = true;
            resolve(session);
          }
        });

        setTimeout(async () => {
          if (!resolved) {
            const { data } = await window.supabaseClient.auth.getSession();
            resolve(data.session || null);
          }
        }, 1200);
      });
    }

    updatePasswordBtn.addEventListener('click', async () => {
      const password = passwordInput.value;
      const confirmPassword = confirmPasswordInput.value;

      if (!password || !confirmPassword) {
        message.textContent = 'Compila entrambi i campi.';
        return;
      }

      if (password !== confirmPassword) {
        message.textContent = 'Le password non coincidono.';
        return;
      }

      if (password.length < 6) {
        message.textContent = 'Usa una password di almeno 6 caratteri.';
        return;
      }

      updatePasswordBtn.disabled = true;
      message.textContent = 'Verifica sessione di recupero...';

      try {
        const session = await waitForRecoverySession();

        if (!session) {
          throw new Error('Sessione di recupero non trovata. Riapri il link ricevuto via email.');
        }

        message.textContent = 'Aggiornamento password in corso...';

        const { error } = await window.supabaseClient.auth.updateUser({
          password
        });

        if (error) {
          throw error;
        }

        message.textContent = 'Password aggiornata con successo. Ora puoi tornare al login.';

        setTimeout(() => {
          window.location.href = 'login.html';
        }, 1500);
      } catch (err) {
        console.error(err);
        message.textContent = 'Errore: ' + (err.message || 'impossibile aggiornare la password.');
      } finally {
        updatePasswordBtn.disabled = false;
      }
    });
  </script>
</body>
</html>
