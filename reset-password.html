<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Recupera password | Ricettario Neil</title>
  <link rel="stylesheet" href="admin.css" />
</head>
<body>
  <main style="max-width:480px;margin:60px auto;padding:24px;">
    <h1>Recupera password</h1>
    <p>Inserisci l’indirizzo email del tuo account admin. Ti invieremo un link per impostare una nuova password.</p>

    <div style="display:grid;gap:12px;">
      <input id="email" type="email" placeholder="La tua email admin" />
      <button id="sendResetBtn" type="button">Invia email di recupero</button>
      <p id="message" style="margin-top:8px;"></p>
    </div>

    <p style="margin-top:20px;">
      <a href="login.html">Torna al login</a>
    </p>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="supabase.js"></script>
  <script>
    const emailInput = document.getElementById('email');
    const sendResetBtn = document.getElementById('sendResetBtn');
    const message = document.getElementById('message');

    sendResetBtn.addEventListener('click', async () => {
      const email = emailInput.value.trim();

      if (!email) {
        message.textContent = 'Inserisci la tua email.';
        return;
      }

      sendResetBtn.disabled = true;
      message.textContent = 'Invio in corso...';

      try {
        const { error } = await window.supabaseClient.auth.resetPasswordForEmail(email, {
          redirectTo: 'https://neil-ricettario.vercel.app/update-password.html'
        });

        if (error) {
          throw error;
        }

        message.textContent = 'Email inviata. Controlla la tua casella di posta e clicca il link di recupero.';
      } catch (err) {
        console.error(err);
        message.textContent = 'Errore: ' + (err.message || 'impossibile inviare l’email di recupero.');
      } finally {
        sendResetBtn.disabled = false;
      }
    });
  </script>
</body>
</html>
