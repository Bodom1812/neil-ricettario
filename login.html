<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Login admin - Ricettario Neil</title>
  <style>
    :root{
      --bg:#090b12;
      --panel:rgba(255,255,255,.08);
      --line:rgba(255,255,255,.12);
      --text:#f4f7ff;
      --muted:#c7d0f0;
      --blue:#5b8cff;
      --cyan:#43d6ff;
      --danger:#ff7b7b;
      --shadow:0 20px 40px rgba(0,0,0,.28);
    }
    *{box-sizing:border-box}
    body{
      margin:0;
      min-height:100vh;
      display:grid;
      place-items:center;
      padding:20px;
      font-family:Inter,system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif;
      color:var(--text);
      background:
        radial-gradient(circle at top left, rgba(91,140,255,.22) 0%, transparent 25%),
        radial-gradient(circle at top right, rgba(67,214,255,.14) 0%, transparent 20%),
        linear-gradient(180deg,#06080f 0%, #0e1526 100%);
    }
    .card{
      width:100%;
      max-width:440px;
      background:var(--panel);
      border:1px solid var(--line);
      border-radius:28px;
      backdrop-filter:blur(16px);
      box-shadow:var(--shadow);
      padding:24px;
    }
    .badge{
      display:inline-block;
      padding:8px 12px;
      border-radius:999px;
      background:rgba(255,255,255,.07);
      border:1px solid var(--line);
      color:var(--muted);
      font-size:12px;
      font-weight:700;
      margin-bottom:12px;
    }
    h1{
      margin:0 0 8px;
      font-size:30px;
      letter-spacing:-.03em;
    }
    p{
      margin:0 0 18px;
      color:var(--muted);
      line-height:1.5;
    }
    form{
      display:grid;
      gap:14px;
    }
    label{
      display:grid;
      gap:8px;
      font-size:13px;
      font-weight:700;
    }
    input{
      width:100%;
      min-height:52px;
      border-radius:16px;
      border:1px solid var(--line);
      background:rgba(255,255,255,.08);
      color:var(--text);
      padding:14px;
      font:inherit;
      outline:none;
    }
    input:focus{
      border-color:rgba(67,214,255,.45);
      box-shadow:0 0 0 4px rgba(67,214,255,.08);
    }
    button{
      min-height:52px;
      border:none;
      border-radius:16px;
      background:linear-gradient(135deg,var(--blue),var(--cyan));
      color:white;
      font:inherit;
      font-weight:800;
      cursor:pointer;
    }
    button:disabled{
      opacity:.7;
      cursor:not-allowed;
    }
    .msg{
      display:none;
      margin-top:14px;
      padding:12px 14px;
      border-radius:14px;
      font-size:14px;
      line-height:1.45;
    }
    .msg.show{display:block}
    .msg.error{
      background:rgba(255,123,123,.10);
      border:1px solid rgba(255,123,123,.22);
      color:#ffd7d7;
    }
    .msg.ok{
      background:rgba(67,214,255,.10);
      border:1px solid rgba(67,214,255,.22);
      color:#dbf8ff;
    }
    .back{
      display:inline-block;
      margin-top:16px;
      color:var(--muted);
      text-decoration:none;
      font-size:14px;
    }
  </style>
</head>
<body>
  <main class="card">
    <div class="badge">Area privata</div>
    <h1>Login admin</h1>
    <p>Accedi con il tuo account Supabase per gestire le ricette.</p>

    <form id="loginForm">
      <label>
        Email
        <input id="email" type="email" required autocomplete="email" />
      </label>

      <p style="margin-top:12px;">
  <a href="reset-password.html">Password dimenticata?</a>
</p>

      <label>
        Password
        <input id="password" type="password" required autocomplete="current-password" />
      </label>

      <button id="loginBtn" type="submit">Accedi</button>
    </form>

    <div id="message" class="msg"></div>

    <a class="back" href="index.html">← Torna al ricettario</a>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="supabase.js"></script>
  <script src="login.js"></script>
</body>
</html>
