<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Admin ricettario Neil</title>
  <link rel="stylesheet" href="admin.css" />
</head>
<body>
  <main class="app">
    <section class="hero">
      <div class="badge">Area admin</div>
      <h1>Aggiungi una ricetta</h1>
      <p>Compila il form, genera il blocco JSON e copialo dentro <code>recipes.json</code>.</p>
    </section>

    <section class="panel">
      <div class="grid">
        <label>
          <span>Titolo</span>
          <input id="title" type="text" placeholder="Es. Lasagne della domenica" />
        </label>

        <label>
          <span>Categoria</span>
          <select id="category">
            <option>Dolci</option>
            <option>Pane e lievitati</option>
            <option>Primi</option>
            <option>Secondi</option>
            <option>Contorni</option>
            <option>Varie</option>
          </select>
        </label>

        <label>
          <span>Preparazione</span>
          <input id="prep" type="text" placeholder="Es. 25 min" />
        </label>

        <label>
          <span>Cottura</span>
          <input id="cook" type="text" placeholder="Es. 35 min" />
        </label>

        <label>
          <span>Riposo</span>
          <input id="rest" type="text" placeholder="Es. 2 h lievitazione" />
        </label>

        <label>
          <span>Totale</span>
          <input id="total" type="text" placeholder="Es. 1 h" />
        </label>

        <label>
          <span>Dosi / Porzioni</span>
          <input id="servings" type="text" placeholder="Es. 4 persone" />
        </label>

        <label>
          <span>Difficoltà</span>
          <select id="difficulty">
            <option>Molto facile</option>
            <option>Facile</option>
            <option>Media</option>
            <option>Difficile</option>
          </select>
        </label>

        <label class="full">
          <span>Fonte (link originale)</span>
          <input id="source" type="url" placeholder="https://..." />
        </label>

        <label class="full">
          <span>Percorso immagine</span>
          <input id="image" type="text" placeholder="images/lasagne-della-domenica.jpg" />
          <small>Puoi scrivere anche solo il nome file, verrà trasformato in <code>images/...</code>.</small>
        </label>

        <label class="full">
          <span>Ingredienti (uno per riga)</span>
          <textarea id="ingredients" rows="8" placeholder="250 g pasta\n500 g ragù\n500 ml besciamella"></textarea>
        </label>

        <label class="full">
          <span>Procedimento (un passaggio per riga)</span>
          <textarea id="steps" rows="10" placeholder="Prepara il ragù.\nPrepara la besciamella.\nComponi gli strati."></textarea>
        </label>
      </div>

      <div class="actions">
        <button id="generate" class="primary">Genera JSON</button>
        <button id="copy">Copia JSON</button>
        <button id="clear">Pulisci</button>
      </div>
    </section>

    <section class="two-col">
      <section class="panel">
        <h2>Anteprima scheda</h2>
        <article id="preview" class="preview-card empty">
          Compila il form per vedere l’anteprima.
        </article>
      </section>

      <section class="panel">
        <h2>Blocco JSON pronto</h2>
        <textarea id="output" class="output" spellcheck="false" placeholder="Qui comparirà il blocco JSON..."></textarea>
        <p class="hint">Incollalo dentro <code>recipes.json</code> come nuovo oggetto, separato da una virgola rispetto al precedente.</p>
      </section>
    </section>
  </main>

  <script src="admin.js"></script>
</body>
</html>
